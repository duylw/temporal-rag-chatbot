services:
  backend:
    build: .
    restart: always
    # Map the backend service port to your local machine
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"

    env_file:
      - .env
    # Ensure the backend service waits for the database to be ready before starting
    depends_on:
      - db
    
    develop:
      watch:
        # Sync Python files directly into the container instantly
        - action: sync
          path: ./src
          target: /app/src
        
        - action: sync
          path: ./main.py
          target: /app/main.py

        # If you add new packages, tell Docker to rebuild the full image
        - action: rebuild
          path: ./pyproject.toml
        
        - action: rebuild
          path: ./uv.lock
  db:
    image: postgres:16-alpine
    restart: always
    # Set up the default database, user, and password
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: fastapidb
    # Map the container's Postgres port to your local machine
    ports:
      - "5433:5432"
    # Mount the volume to persist data across container restarts
    volumes:
      - postgres_data:/var/lib/postgresql/data

  chromadb:
    image: chromadb/chroma
    restart: always
    volumes:
      - chroma_data:/data
    ports:
      - "8008:8000"

  adminer:
    image: adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db

# Define the named volume
volumes:
  postgres_data:
  chroma_data: